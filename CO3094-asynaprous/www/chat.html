<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK-Messenger</title>
    <link rel="stylesheet" href="/css/messenger.css">
</head>
<body>
    <!-- LEFT SIDEBAR: All Conversations -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <img src="/images/logo.png" alt="BK">
                <span>Chats</span>
            </div>
            <div class="sidebar-actions">
                <button class="icon-btn" onclick="showNewChannelModal()" title="New Channel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="sidebar-search">
            <input type="text" id="searchInput" placeholder="Search..." oninput="filterSidebar()">
        </div>

        <!-- Single unified conversation list (channels + DMs together) -->
        <div class="sidebar-list" id="conversationList"></div>

        <!-- Current user bar at bottom -->
        <div class="sidebar-user">
            <div class="user-avatar" id="currentUserAvatar"></div>
            <div class="user-name" id="currentUserName"></div>
            <button class="icon-btn" onclick="handleLogout()" title="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- CENTER: Message Area -->
    <div class="chat-main">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatTitle">BK-Messenger</div>
                <div class="chat-header-status" id="chatStatus">Select a conversation</div>
            </div>
            <div class="chat-header-actions">
                <button class="icon-btn" onclick="showPeerInfo()" title="Info">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <img src="/images/logo.png" alt="BK-Messenger" class="welcome-logo">
                <h2>Welcome to BK-Messenger</h2>
                <p>Select a conversation to start chatting</p>
            </div>
        </div>

        <div class="message-input-area" id="inputArea" style="display:none">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Aa"
                       onkeydown="if(event.key==='Enter')sendMessage()" autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- RIGHT: Info Panel -->
    <div class="info-panel hidden" id="infoPanel">
        <div class="info-header">
            <h3 id="infoPanelTitle">Details</h3>
            <button class="icon-btn" onclick="toggleInfoPanel()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="info-content" id="infoContent"></div>
    </div>

    <!-- NEW CHANNEL MODAL -->
    <div class="modal-overlay hidden" id="newChannelModal">
        <div class="modal-card">
            <h3>Create New Channel</h3>
            <input type="text" id="newChannelName" placeholder="Channel name..."
                   onkeydown="if(event.key==='Enter')createChannel()">
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideNewChannelModal()">Cancel</button>
                <button class="btn-primary" onclick="createChannel()">Create</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/chat.js"></script>
</body>
</html>
