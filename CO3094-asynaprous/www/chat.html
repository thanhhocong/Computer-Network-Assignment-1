<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK Discordmess</title>
    <link rel="stylesheet" href="/css/messenger.css">
</head>
<body>
    <div class="app">
        <!-- SERVER STRIP -->
        <nav class="server-strip">
            <div class="server-icon home-icon active" id="dmNavBtn" onclick="selectView('dm')" title="Direct Messages">
                <svg viewBox="0 0 28 20" fill="currentColor">
                    <path d="M23.0212 1.67671C21.3107 0.879656 19.5079 0.318797 17.6584 0C17.4062 0.461742 17.1749 0.934541 16.9708 1.4184C15.003 1.12145 12.9974 1.12145 11.0292 1.4184C10.8251 0.934541 10.5765 0.461742 10.3416 0C8.49019 0.321397 6.68494 0.884613 4.97441 1.68392C1.32553 7.04418 0.351418 12.2685 0.838554 17.4211C2.81972 18.8952 4.97885 19.9982 7.27609 20.6871C7.81877 19.9457 8.29999 19.1606 8.71533 18.3383C7.95058 18.0518 7.21429 17.6947 6.51645 17.2735C6.69951 17.1392 6.87813 17.0009 7.05231 16.8582C11.4524 18.9079 16.5571 18.9079 20.9477 16.8582C21.124 17.0009 21.3005 17.1392 21.484 17.2735C20.7846 17.6947 20.0477 18.0518 19.2847 18.3383C19.7 19.1606 20.1812 19.9457 20.7239 20.6871C23.0234 19.9982 25.1803 18.8952 27.1614 17.4211C27.7425 11.4067 26.2117 6.23428 23.0212 1.67671Z"/>
                </svg>
            </div>
            <div class="strip-separator"></div>
            <div id="serverNavList"></div>
            <div class="server-icon add-icon" id="addServerBtn" onclick="showCreateServerModal()" title="Add a Server">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11h-7V4a1 1 0 00-2 0v7H4a1 1 0 000 2h7v7a1 1 0 002 0v-7h7a1 1 0 000-2z"/>
                </svg>
            </div>
        </nav>

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header" id="sidebarHeader">
                <input class="sidebar-header-search" id="searchInput"
                       placeholder="Find or start a conversation" oninput="filterSidebar()">
            </div>

            <div class="sidebar-content" id="sidebarContent"></div>

            <!-- User bar -->
            <div class="user-bar">
                <div class="user-bar-avatar" id="userAvatar"></div>
                <div class="user-bar-info">
                    <div class="user-bar-name" id="userName"></div>
                    <div class="user-bar-status">Online</div>
                </div>
                <div class="user-bar-actions">
                    <button class="user-bar-btn" id="adminBtn" onclick="showAdminPanel()" title="Admin Panel" style="display:none">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#5865f2" stroke-width="2">
                            <path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/>
                        </svg>
                    </button>
                    <button class="user-bar-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle Theme">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
                            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
                        </svg>
                    </button>
                    <button class="user-bar-btn" onclick="handleLogout()" title="Log Out">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- CHAT AREA -->
        <main class="chat-area">
            <div class="chat-header" id="chatHeader">
                <div class="chat-header-left">
                    <span class="hash" id="chatHashIcon">#</span>
                    <span class="chat-header-title" id="chatTitle">BK Discordmess</span>
                </div>
                <div class="chat-header-actions">
                    <button class="header-btn" id="deleteChannelBtn" onclick="deleteCurrentChannel()" title="Delete Channel" style="display:none">
                        <svg viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                    <button class="header-btn" id="membersToggle" onclick="toggleMembers()" title="Members" style="display:none">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
                            <circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/>
                            <path d="M16 3.13a4 4 0 010 7.75"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="messages-scroll" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <img src="/images/logo.png" alt="BK Discordmess" onerror="this.style.display='none'">
                    <h2>Welcome to BK Discordmess</h2>
                    <p>Select a conversation to start chatting</p>
                </div>
            </div>

            <div class="input-area" id="inputArea" style="display:none">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Message #channel"
                           onkeydown="if(event.key==='Enter')sendMessage()" autocomplete="off">
                    <button class="input-send-btn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M5.74 19L21 12 5.74 5 5.73 10.5 17 12 5.73 13.5z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- MEMBERS PANEL -->
        <aside class="members-panel hidden" id="membersPanel"></aside>
    </div>

    <!-- CREATE SERVER MODAL -->
    <div class="modal-overlay hidden" id="createServerModal">
        <div class="modal-card">
            <h3>Create a Server</h3>
            <p style="text-align:center;color:var(--text-muted);margin-bottom:16px;font-size:14px">
                Your server is where you and your friends hang out.
            </p>
            <div class="form-group">
                <label>Server Name</label>
                <input type="text" id="newServerName" placeholder="Enter server name"
                       onkeydown="if(event.key==='Enter')createServer()">
            </div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="hideModal('createServerModal')">Back</button>
                <button class="btn-modal-confirm" onclick="createServer()">Create</button>
            </div>
        </div>
    </div>

    <!-- CREATE CHANNEL MODAL -->
    <div class="modal-overlay hidden" id="createChannelModal">
        <div class="modal-card">
            <h3>Create Channel</h3>
            <div class="form-group">
                <label>Channel Name</label>
                <input type="text" id="newChannelName" placeholder="new-channel"
                       onkeydown="if(event.key==='Enter')createChannel()">
            </div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="hideModal('createChannelModal')">Cancel</button>
                <button class="btn-modal-confirm" onclick="createChannel()">Create Channel</button>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL MODAL -->
    <div class="modal-overlay hidden" id="adminModal">
        <div class="modal-card" style="max-width:520px">
            <h3 style="display:flex;align-items:center;justify-content:center;gap:8px">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5865f2" stroke-width="2">
                    <path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/>
                </svg>
                Admin Panel
            </h3>
            <div id="adminUserList" style="margin:16px 0"></div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="hideModal('adminModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/chat.js"></script>
</body>
</html>
