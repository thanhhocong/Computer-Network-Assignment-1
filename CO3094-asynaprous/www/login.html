<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK-Messenger | Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0032A0 0%, #0078D4 50%, #00B4D8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-section img {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo-section h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-top: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .logo-section p {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            margin-top: 6px;
        }

        .login-card {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
        }

        .login-card h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #0078D4;
            box-shadow: 0 0 0 3px rgba(0,120,212,0.15);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0032A0, #0078D4);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,50,160,0.4);
        }

        .btn-login:active { transform: translateY(0); }

        .error-msg {
            color: #e74c3c;
            text-align: center;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
            color: #999;
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .btn-admin {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #0078D4;
            border: 2px solid #0078D4;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-admin:hover {
            background: #0078D4;
            color: #fff;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        .accounts-hint {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            color: rgba(255,255,255,0.85);
            font-size: 12px;
        }

        .accounts-hint strong { color: #fff; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="/images/logo.png" alt="BK-Messenger">
            <h1>BK-Messenger</h1>
            <p>HCMC University of Technology</p>
        </div>

        <div class="login-card">
            <h2>Sign In</h2>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username"
                           placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Sign In</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>

            <div class="divider">or</div>

            <a href="/admin">
                <button type="button" class="btn-admin">Admin Login (Basic Auth)</button>
            </a>
        </div>

        <div class="accounts-hint">
            <strong>Demo accounts:</strong> alice/alice123, bob/bob123, charlie/charlie123
        </div>

        <div class="footer-text">
            CO3094 Computer Network &mdash; Assignment 1
        </div>
    </div>

    <script>
    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.style.display = 'none';

        try {
            const resp = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await resp.json();

            if (resp.ok && data.status === 'ok') {
                if (data.token) sessionStorage.setItem('session_token', data.token);
                window.location.href = '/chat.html';
            } else {
                errorMsg.textContent = data.error || 'Invalid credentials';
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.textContent = 'Connection error. Please try again.';
            errorMsg.style.display = 'block';
        }
    }
    </script>
</body>
</html>
